before_script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

image: docker:20.10.6

services:
  - docker:20.10.6-dind

variables:
  # DOCKER_HOST: tcp://docker:2375
  # DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

build_aws:
  script:
    - docker pull "${CI_REGISTRY_IMAGE}:${CSP}" || true
    - docker buildx create --name mybuilder --use
    - docker buildx build --platform linux/amd64,linux/arm64 --build-arg CSP --cache-from "${CI_REGISTRY_IMAGE}:${CSP}" --tag "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}-${CSP}" --tag "${CI_REGISTRY_IMAGE}:${CSP}" .
    - docker push "${CI_REGISTRY_IMAGE}"
  variables:
    CSP: aws
  only:
    refs:
      - master

build_azure:
  script:
    - docker pull "${CI_REGISTRY_IMAGE}:${CSP}" || true
    - docker buildx create --name mybuilder --use
    - docker buildx build --platform linux/amd64,linux/arm64 --build-arg CSP --cache-from "${CI_REGISTRY_IMAGE}:${CSP}" --tag "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}-${CSP}" --tag "${CI_REGISTRY_IMAGE}:${CSP}" .
    - docker push "${CI_REGISTRY_IMAGE}"
  variables:
    CSP: azure
  only:
    refs:
      - master

build_gcp:
  script:
    - docker pull "${CI_REGISTRY_IMAGE}:${CSP}" || true
    - docker buildx create --name mybuilder --use
    - docker buildx build --platform linux/amd64,linux/arm64 --build-arg CSP --cache-from "${CI_REGISTRY_IMAGE}:${CSP}" --tag "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}-${CSP}" --tag "${CI_REGISTRY_IMAGE}:${CSP}" .
    - docker push "${CI_REGISTRY_IMAGE}"
  variables:
    CSP: gcp
  only:
    refs:
      - master
